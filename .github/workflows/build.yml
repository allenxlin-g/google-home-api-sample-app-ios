name: iOS Build Verification

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Sample App
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      # 這裡加入 Cache Action 來快取 Xcode 的 Swift Packages
      - name: Cache Swift Packages
        uses: actions/cache@v5.0.5
        with:
          # 指定要快取和還原的檔案路徑 (這裡指向 Xcode 下載 SPM 依賴的預設位置)
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          # 設定快取的唯一鍵值，當 Package.resolved 檔案改變時，就會建立新的快取
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          # 如果找不到完全匹配的 key，則使用前綴匹配來尋找舊的快取
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Prepare SDK Directory
        run: |
          mkdir -p ThirdParty/GoogleHomeSDK
          echo "SDK placeholder" > ThirdParty/GoogleHomeSDK/placeholder.txt

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project GoogleHomeAPISampleIOS.xcodeproj \
            -scheme GoogleHomeAPISampleIOS \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
